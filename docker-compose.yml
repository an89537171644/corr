services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://corrosion:corrosion@postgres:5432/corrosion_mvp
      DB_SCHEMA_MODE: migrate
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: corrosion_mvp
      POSTGRES_USER: corrosion
      POSTGRES_PASSWORD: corrosion
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U corrosion -d corrosion_mvp"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
